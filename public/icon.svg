<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#15803d"/>
      <stop offset="100%" style="stop-color:#166534"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Invoice paper -->
  <rect x="120" y="80" width="272" height="352" rx="16" fill="white" opacity="0.95"/>
  <!-- Header bar on invoice -->
  <rect x="120" y="80" width="272" height="64" rx="16" fill="#f59e0b"/>
  <rect x="120" y="120" width="272" height="24" fill="#f59e0b"/>
  <!-- Company name lines -->
  <rect x="144" y="96" width="180" height="10" rx="5" fill="white" opacity="0.9"/>
  <rect x="144" y="112" width="120" height="7" rx="3" fill="white" opacity="0.6"/>
  <!-- Divider -->
  <rect x="136" y="164" width="240" height="2" rx="1" fill="#e5e7eb"/>
  <!-- Invoice line items -->
  <rect x="136" y="180" width="150" height="8" rx="4" fill="#d1fae5"/>
  <rect x="300" y="180" width="60" height="8" rx="4" fill="#15803d" opacity="0.7"/>
  <rect x="136" y="200" width="130" height="7" rx="3" fill="#e5e7eb"/>
  <rect x="300" y="200" width="60" height="7" rx="3" fill="#15803d" opacity="0.5"/>
  <rect x="136" y="218" width="140" height="7" rx="3" fill="#e5e7eb"/>
  <rect x="300" y="218" width="60" height="7" rx="3" fill="#15803d" opacity="0.5"/>
  <rect x="136" y="236" width="120" height="7" rx="3" fill="#e5e7eb"/>
  <rect x="300" y="236" width="60" height="7" rx="3" fill="#15803d" opacity="0.5"/>
  <!-- Total box -->
  <rect x="136" y="264" width="240" height="2" rx="1" fill="#e5e7eb"/>
  <rect x="200" y="278" width="176" height="32" rx="8" fill="#15803d"/>
  <rect x="212" y="286" width="80" height="8" rx="4" fill="white" opacity="0.7"/>
  <rect x="308" y="286" width="56" height="8" rx="4" fill="#f59e0b"/>
  <!-- Rupee symbol -->
  <text x="256" y="370" font-family="Arial" font-size="48" font-weight="bold" fill="#15803d" text-anchor="middle" opacity="0.15">₹</text>
  <!-- Leaf accent bottom right -->
  <circle cx="390" cy="400" r="48" fill="#f59e0b" opacity="0.15"/>
  <text x="390" y="416" font-family="Arial" font-size="40" text-anchor="middle">🌾</text>
</svg>
